<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>File Renamer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        input { display: block; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>File Renamer</h1>
    <input type="file" id="fileInput" multiple>
    <input type="text" id="prefix" placeholder="Enter new prefix">
    <button onclick="processFiles()">Rename & Download</button>

    <script>
        async function processFiles() {
            const files = document.getElementById('fileInput').files;
            const prefix = document.getElementById('prefix').value || "file";
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const extension = file.name.split('.').pop();
                const newName = `${prefix}_${i + 1}.${extension}`;
                
                // Trigger download
                const url = URL.createObjectURL(file);
                const a = document.createElement('a');
                a.href = url;
                a.download = newName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        }
    </script>
</body>
</html>
