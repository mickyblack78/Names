<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; height: 100vh; overflow: hidden; background: #222; background-size: cover; background-position: center; transition: background 0.8s ease; }
        #hud { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.7); color: #ffd700; display: flex; justify-content: space-around; align-items: center; z-index: 1000; font-family: sans-serif; }
        #pile { position: relative; width: 100vw; height: 100vh; }
        .tile { position: absolute; width: 80px; height: 80px; background: #fff; border-radius: 12px; border: 2px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; transition: transform 0.2s; }
        .tile.flipped { border-color: #ffd700; transform: scale(1.05); }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; color: white; }
    </style>
</head>
<body>
    <div id="hud">
        <span>IQ: <span id="iq">100</span></span>
        <span>Rank: Master</span>
        <span>Rules: Match symbols to clear the pile.</span>
    </div>
    <div id="pile"></div>
    <div id="overlay">
        <h2>Stage Failed</h2>
        <button onclick="initStage()">Restart</button>
        <button onclick="nextStage()">Skip</button>
    </div>
<script>
    let stage = 1, mistakes = 0, flipped = [], lock = false;
    const pile = document.getElementById('pile');
    
    function initStage() {
        document.getElementById('overlay').style.display = 'none';
        document.body.style.backgroundImage = 'none';
        pile.innerHTML = ''; flipped = []; mistakes = 0;
        let count = 20 + (stage * 4);
        let symbols = Array.from({length: count/2}, (_, i) => i);
        let tiles = [...symbols, ...symbols].sort(() => Math.random() - 0.5);
        
        tiles.forEach((val, i) => {
            let div = document.createElement('div');
            div.className = 'tile'; div.innerText = val; // Replace with your icon logic
            div.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            div.style.top = (Math.random() * (window.innerHeight - 150) + 70) + 'px';
            div.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
            div.onclick = () => flip(div);
            pile.appendChild(div);
        });
    }

    function flip(tile) {
        if (lock || tile.classList.contains('flipped')) return;
        tile.classList.add('flipped');
        flipped.push(tile);
        if (flipped.length === 2) {
            lock = true;
            if (flipped[0].innerText === flipped[1].innerText) {
                flipped.forEach(t => t.style.visibility = 'hidden');
                flipped = []; lock = false;
                if (pile.querySelectorAll('.tile[style*="visibility: hidden"]').length === pile.children.length) nextStage();
            } else {
                mistakes++;
                if (mistakes >= 3) document.getElementById('overlay').style.display = 'flex';
                else setTimeout(() => { flipped.forEach(t => t.classList.remove('flipped')); flipped = []; lock = false; }, 800);
            }
        }
    }

    function nextStage() {
        document.body.style.backgroundImage = `url('${stage}.png')`;
        stage++;
        if (stage > 10) alert("Test Complete!"); else initStage();
    }
    initStage();
</script>
</body>
</html>
