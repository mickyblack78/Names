<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AZRA'S GARDEN</title>
    <style>
        body { background-color: #000; color: #FFD700; margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-image: url('star.png'); background-size: cover; }
        
        /* SCREENS */
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 300; background: rgba(0,0,0,0.9); text-align: center; overflow-y: auto; }
        #home-screen { display: flex; }
        
        /* UI ELEMENTS */
        #hud { position: fixed; top: 0; width: 100%; height: 60px; background: #111; display: none; justify-content: space-around; align-items: center; z-index: 100; border-bottom: 2px solid #FFD700; }
        #game-area { position: relative; width: 100vw; height: calc(100dvh - 60px); margin-top: 60px; display: none; }
        .tile { position: absolute; width: 15vw; height: 15vw; border: 2px solid #FFD700; border-radius: 8px; cursor: pointer; transition: 0.2s; background-size: cover; background-position: center; }
        
        /* LIBRARY & OVERLAYS */
        #lib-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; width: 90%; }
        #lib-grid img { width: 100%; border: 1px solid #444; border-radius: 5px; cursor: pointer; }
        #full-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 500; display: none; justify-content: center; align-items: center; }
        #full-view img { max-width: 95%; max-height: 95%; border: 2px solid gold; }

        input, button, select { padding: 12px; margin: 8px; border-radius: 5px; border: 1px solid gold; background: #222; color: gold; font-size: 1rem; }
        .stat-box { border: 1px solid #444; padding: 15px; margin: 10px; width: 80%; background: #111; border-radius: 10px; }
    </style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home-screen" class="screen">
    <h1>AZRA'S GARDEN</h1>
    <div class="stat-box">
        <input type="text" id="playerName" placeholder="Enter Gardener Name">
        <button onclick="login()">LOGIN / LOAD PROFILE</button>
        <p id="profile-status">No profile loaded</p>
    </div>

    <div id="menu-options" style="display:none;">
        <div class="stat-box">
            <p id="stats-display">Stage: 1 | IQ: 100 | Keys: 0</p>
            <label>Difficulty (1-5):</label>
            <input type="range" id="diffRange" min="1" max="5" value="1" oninput="state.difficulty = this.value; document.getElementById('diffVal').innerText = this.value">
            <span id="diffVal">1</span>
        </div>
        
        <button onclick="launchGame()" style="background: gold; color: black; font-weight: bold;">START GARDENING</button>
        <button onclick="toggleLibrary()">OPEN LIBRARY</button>
        <button onclick="showRules()">HOW TO PLAY</button>
        <button onclick="logout()">LOGOUT</button>
    </div>
</div>

<!-- HUD -->
<div id="hud">
    <div id="iq-hud">IQ: 100</div>
    <div id="stage-hud">Stage: 1</div>
    <div id="keys-hud" onclick="showChests()" style="cursor:pointer; border: 1px solid gold; padding: 4px;">Keys: 0</div>
    <button onclick="exitToHome()">HOME</button>
</div>

<!-- OVERLAYS -->
<div id="game-area"></div>
<div id="overlay" class="screen"></div>
<div id="full-view" onclick="this.style.display='none'"></div>

<script>
    // --- DATABASE (LARGE STORAGE) ---
    const db = {
        open: () => new Promise(res => {
            let req = indexedDB.open("AzraDB", 1);
            req.onupgradeneeded = () => req.result.createObjectStore("store");
            req.onsuccess = () => res(req.result);
        }),
        get: async (k) => {
            const d = await db.open();
            return new Promise(r => {
                let t = d.transaction("store", "readonly").objectStore("store").get(k);
                t.onsuccess = () => r(t.result);
            });
        },
        set: async (k, v) => {
            const d = await db.open();
            d.transaction("store", "readwrite").objectStore("store").put(v, k);
        }
    };

    // --- GLOBAL STATE ---
    let state = {
        player: '', stage: 1, iq: 100, keys: 0, chestCycle: 0, difficulty: 1,
        tiles: [], rewardPool: [], chestPool: [], library: [], 
        active: false, selected: []
    };

    const sounds = {
        bgm: new Audio('bgm.mp3'), ping: new Audio('ping.wav'), 
        win: new Audio('success.mp3'), creak: new Audio('creak.mp3')
    };

    // --- PROFILE SYSTEM ---
    async function login() {
        const name = document.getElementById('playerName').value;
        if (!name) return alert("Enter a name!");
        state.player = name;

        // Instant Load
        state.stage = parseInt(localStorage.getItem(`azraStage_${name}`)) || 1;
        state.iq = parseInt(localStorage.getItem(`azraIQ_${name}`)) || 100;
        state.keys = parseInt(localStorage.getItem(`azraKeys_${name}`)) || 0;
        state.chestCycle = parseInt(localStorage.getItem(`azraCycle_${name}`)) || 0;
        
        // Large Load
        state.library = await db.get(`lib_${name}`) || [];

        document.getElementById('profile-status').innerText = `Welcome, ${name}!`;
        document.getElementById('menu-options').style.display = 'block';
        updateHUD();
        saveGame();
    }

    function logout() { location.reload(); }

    // --- GAME ENGINE ---
    async function launchGame() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        document.getElementById('game-area').style.display = 'block';
        
        sounds.bgm.loop = true;
        sounds.bgm.play();
        
        await initAssets();
        renderStage();
    }

    async function initAssets() {
        state.tiles = []; state.rewardPool = []; state.chestPool = [];
        
        const loadSlice = async (file, rows, cols, arr) => {
            const img = new Image(); img.src = file;
            await img.decode();
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const w = img.width / cols, h = img.height / rows;
            for(let i=0; i<(rows*cols); i++) {
                canvas.width = w; canvas.height = h;
                ctx.drawImage(img, (i%cols)*w, Math.floor(i/cols)*h, w, h, 0, 0, w, h);
                arr.push(canvas.toDataURL());
            }
        };

        // Prize sheet based on milestones
        let prizeFile = 'A2.png';
        if (state.stage > 75) prizeFile = 'a2a3.png';
        else if (state.stage > 50) prizeFile = 'a2a2.png';
        else if (state.stage > 25) prizeFile = 'a2a1.png';

        await loadSlice('P50.png', 7, 7, state.tiles);
        await loadSlice(prizeFile, 5, 5, state.rewardPool);
        await loadSlice('A3.png', 7, 7, state.chestPool);
    }

    function renderStage() {
        state.active = true;
        state.selected = [];
        const area = document.getElementById('game-area');
        area.innerHTML = '';
        
        // Difficulty Logic
        let baseTiles = 8 + (state.difficulty * 4);
        let count = Math.min(70, baseTiles + (state.stage * 2));
        if (count % 2 !== 0) count++;

        // Random Selection (Reduce Repetition)
        let deck = [...state.tiles].sort(() => Math.random() - 0.5).slice(0, count/2);
        deck = [...deck, ...deck].sort(() => Math.random() - 0.5);

        deck.forEach(src => {
            const el = document.createElement('div');
            el.className = 'tile';
            el.style.backgroundImage = `url(${src})`;
            el.style.left = Math.random() * (window.innerWidth - 80) + 'px';
            el.style.top = Math.random() * (window.innerHeight - 180) + 'px';
            el.onclick = () => handleTap(el, src);
            area.appendChild(el);
        });
        updateHUD();
    }

    function handleTap(el, src) {
        if (!state.active || state.selected.length >= 2 || el.style.visibility === 'hidden') return;
        el.style.border = "2px solid white";
        state.selected.push({el, src});
        playSnd('ping');

        if (state.selected.length === 2) {
            state.active = false;
            setTimeout(() => {
                if (state.selected[0].src === state.selected[1].src) {
                    state.selected.forEach(s => s.el.style.visibility = 'hidden');
                    state.iq += 10;
                    playSnd('win');
                    if (document.querySelectorAll('.tile:not([style*="hidden"])').length === 0) completeStage();
                    else state.active = true;
                } else {
                    state.selected.forEach(s => s.el.style.border = "2px solid gold");
                    state.active = true;
                }
                state.selected = [];
                updateHUD();
            }, 300); // Snappy 300ms delay
        }
    }

    function completeStage() {
        const prize = state.rewardPool[(state.stage - 1) % 25];
        if(!state.library.includes(prize)) state.library.push(prize);
        if (state.stage % 3 === 0) state.keys++;
        
        state.stage++;
        saveGame();
        
        const overlay = document.getElementById('overlay');
        overlay.innerHTML = `<h1>STAGE ${state.stage-1} CLEAR</h1><img src="${prize}" style="width:70%; border:2px solid gold;"><p>Added to Library</p><button onclick="exitToHome()">RETURN TO HOME</button>`;
        overlay.style.display = 'flex';
    }

    // --- CHEST SYSTEM (NO DUPLICATES) ---
    function showChests() {
        if (state.keys <= 0) return alert("No Keys!");
        state.active = false;
        const cycle = [1, 0, 2];
        const pos15 = cycle[state.chestCycle % 3];
        const options = [5, 10]; if(Math.random() > 0.5) options.reverse();
        options.splice(pos15, 0, 15);

        let html = '<h1>PICK A CHEST</h1><div style="display:flex;">';
        options.forEach(amt => html += `<img src="Treasure.png" class="chest" onclick="openChest(${amt})">`);
        document.getElementById('overlay').innerHTML = html + '</div>';
        document.getElementById('overlay').style.display = 'flex';
    }

    function openChest(amt) {
        playSnd('creak');
        state.keys--; state.chestCycle++;
        
        // Prioritize missing pieces
        let missing = state.chestPool.filter(pic => !state.library.includes(pic));
        let pool = missing.length > 0 ? missing : state.chestPool;
        let finds = [...pool].sort(() => Math.random() - 0.5).slice(0, amt);
        
        finds.forEach(f => { if(!state.library.includes(f)) state.library.push(f); });
        saveGame();
        alert(`Unlocked ${finds.length} new patterns!`);
        exitToHome();
    }

    // --- UTILS ---
    function saveGame() {
        const n = state.player;
        localStorage.setItem(`azraStage_${n}`, state.stage);
        localStorage.setItem(`azraIQ_${n}`, state.iq);
        localStorage.setItem(`azraKeys_${n}`, state.keys);
        localStorage.setItem(`azraCycle_${n}`, state.chestCycle);
        db.set(`lib_${n}`, state.library);
    }

    function updateHUD() {
        const stats = `Stage: ${state.stage} | IQ: ${state.iq} | Keys: ${state.keys}`;
        document.getElementById('stats-display').innerText = stats;
        document.getElementById('iq-hud').innerText = `IQ: ${state.iq}`;
        document.getElementById('stage-hud').innerText = `Stage: ${state.stage}`;
        document.getElementById('keys-hud').innerText = `Keys: ${state.keys}`;
    }

    function toggleLibrary() {
        const over = document.getElementById('overlay');
        over.style.display = 'flex';
        let html = '<h1>LIBRARY</h1><div id="lib-grid">';
        state.library.forEach(img => html += `<img src="${img}" onclick="viewFull('${img}')">`);
        over.innerHTML = html + '</div><button onclick="document.getElementById(\'overlay\').style.display=\'none\'">CLOSE</button>';
    }

    function viewFull(src) {
        const v = document.getElementById('full-view');
        v.innerHTML = `<img src="${src}">`;
        v.style.display = 'flex';
    }

    function exitToHome() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('hud').style.display = 'none';
        document.getElementById('home-screen').style.display = 'flex';
        updateHUD();
    }

    function playSnd(t) { let s = sounds[t].cloneNode(); s.volume = 0.5; s.play(); }

    function showRules() {
        alert("RULES:\n1. Match pairs of tiles to clear the garden.\n2. Earn prizes for every stage.\n3. Every 3 stages earn a KEY.\n4. Use Keys on the HUD to unlock chests for rare A3 patterns.\n5. Difficulty affects how many tiles spawn.");
    }
</script>
</body>
</html>
